<!doctype html>
<!-- NOTE: This is the Vite SPA shell. The old public/index.html (landing page) has been
     superseded by src/views/HomeView.vue. You can delete or rename public/index.html
     to avoid confusion — it is no longer served in development. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#06b6d4">
  <!-- iOS Safari PWA tags. The manifest.webmanifest declares
       display: standalone, but iOS Safari ignores the manifest
       for "Add to Home Screen" — it needs these apple-mobile-
       web-app-* meta tags instead. Without them, an installed
       PWA opens in Safari WITH the URL bar visible, breaking
       the standalone illusion (and stealing ~80px of vertical
       space, which matters poolside on a small phone).
       black-translucent + viewport-fit=cover lets the page
       draw under the notch / status bar so the safe-area-inset
       env() values become non-zero and the design's notch-aware
       paddings actually apply. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DivingHQ">
  <title>DivingHQ</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
  <!-- Fonts. preconnect lets the HTML parser kick off DNS + TLS
       to fonts.googleapis.com + fonts.gstatic.com in parallel
       with the main JS/CSS bundle download. The stylesheet link
       itself is render-blocking by default, but display=swap on
       the font URL means the design still paints (with a system
       fallback) immediately and swaps to Barlow Condensed when
       ready. Previously this was an @import at the top of
       app.css, which blocks first paint while the CSSOM waits
       for the round-trip — measurable papercut on slow poolside
       cell connections. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700;1,900&family=DM+Mono:wght@300;400;500&display=swap">
  <!-- Global stylesheet is imported by src/main.js so Vite
       content-hashes the bundled filename. -->
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
