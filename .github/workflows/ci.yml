name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build SPA + lint server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (syntax-check)
        run: npm run lint

      - name: Build SPA
        run: npm run build

  test:
    name: Tests against Postgres
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: diver
          POSTGRES_PASSWORD: diver
          POSTGRES_DB: diverecorder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGUSER: diver
      PGPASSWORD: diver
      PGDATABASE: diverecorder_test
      # JWT_SECRET is required for server.js to boot (it fail-closes
      # on missing or placeholder values). The integration test
      # require()s server.js directly, so without this the whole
      # test run dies at startup. Use a long deterministic dummy —
      # CI never sees real user data.
      JWT_SECRET: ci-test-secret-do-not-use-in-prod-aaaaaaaaaaaaaaaa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply schema (init.sql)
        run: psql -v ON_ERROR_STOP=1 -h localhost -U diver -d diverecorder_test -f init.sql

      - name: Run tests
        run: npm test
