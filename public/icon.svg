<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="DivingHQ">
  <!-- DivingHQ mark — minimalist arc + dot.
       The path of a dive reduced to its essential form: a
       parabolic arc with a single dot at apex (take-off) and
       a smaller dot at water entry. Concentric rings at entry
       read as a splash without requiring figurative water
       lines. Scales cleanly from 16px favicon to 512px splash
       because the geometry has no fine detail that breaks at
       small sizes.

       Wordmark below uses DivingHQ's brand colour rhythm:
       "DIVING" in white (text), "HQ" in cyan (accent), set
       via <tspan> inside a single <text> element so kerning
       and baseline alignment stay locked. -->
  <rect width="512" height="512" rx="96" fill="#030712"/>

  <!-- Arc — the dive's flight path. Soft cyan halo behind the
       solid stroke so the mark feels lit, not flat. -->
  <path d="M 120 380 Q 256 80 392 380"
        stroke="#06b6d4" stroke-width="22" fill="none"
        stroke-linecap="round" opacity="0.18"/>
  <path d="M 120 380 Q 256 80 392 380"
        stroke="#06b6d4" stroke-width="12" fill="none"
        stroke-linecap="round"/>

  <!-- Apex dot — the diver at take-off. White matches the
       "DIVING" wordmark colour below, reinforcing the
       brand's white-then-cyan reading direction. -->
  <circle cx="256" cy="138" r="22" fill="#ffffff"/>
  <!-- Subtle inner highlight — gives the dot a sense of mass
       at large sizes, harmlessly disappears at favicon scale. -->
  <circle cx="251" cy="133" r="6" fill="#06b6d4" opacity="0.35"/>

  <!-- Entry dot — water entry. Cyan, matching "HQ". -->
  <circle cx="392" cy="380" r="10" fill="#06b6d4"/>
  <!-- Concentric ripples — splash without literal water. -->
  <circle cx="392" cy="380" r="22" fill="none"
          stroke="#06b6d4" stroke-width="2" opacity="0.4"/>
  <circle cx="392" cy="380" r="34" fill="none"
          stroke="#06b6d4" stroke-width="2" opacity="0.2"/>

  <!-- Wordmark — DIVING in white, HQ in cyan. <tspan> keeps
       both halves on a single baseline with shared
       font-family / weight / letter-spacing. -->
  <text x="120" y="448" text-anchor="start"
        font-family="Helvetica, Arial, sans-serif"
        font-size="32" font-weight="900" font-style="italic"
        letter-spacing="2">
    <tspan fill="#ffffff">DIVING</tspan><tspan fill="#06b6d4">HQ</tspan>
  </text>
  <!-- Sub-tagline — quiet, muted cyan. Anchors visually under
       the wordmark and reinforces "this is a sports app". -->
  <text x="120" y="475" text-anchor="start"
        font-family="Helvetica, Arial, sans-serif"
        font-size="11" font-weight="600"
        letter-spacing="5" fill="#67e8f9" opacity="0.6">DIVE · SCORE · STREAM</text>
</svg>
