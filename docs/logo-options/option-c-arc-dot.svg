<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="DivingHQ logo — option C">
  <!-- OPTION C — Arc + dot
       The path of a dive, reduced to its essential form: a
       parabolic arc with a single cyan dot at the apex (the
       diver at take-off), tracing down to a smaller dot at
       water entry. Most abstract of the four; works
       brilliantly at every scale because the geometry is so
       simple. Best for the favicon — readable even at 16px.

       Style sensibility: Apple SF Symbols, Notion, Linear —
       the kind of mark you can sketch from memory after seeing
       it once. -->
  <rect width="512" height="512" rx="96" fill="#030712"/>

  <!-- The arc itself. Two strokes for depth — main bold cyan
       + an underlay glow. -->
  <path d="M 120 380 Q 256 80 392 380"
        stroke="#06b6d4" stroke-width="22" fill="none"
        stroke-linecap="round" opacity="0.18"/>
  <path d="M 120 380 Q 256 80 392 380"
        stroke="#06b6d4" stroke-width="12" fill="none"
        stroke-linecap="round"/>

  <!-- Apex dot — the diver at peak height. Slightly larger
       than the entry dot so the eye reads "starts here". -->
  <circle cx="256" cy="138" r="22" fill="#67e8f9"/>
  <!-- Tiny inner highlight to give the dot a sense of life -->
  <circle cx="251" cy="133" r="6" fill="#ffffff" opacity="0.55"/>

  <!-- Entry dot + ripple — where the dive lands. The two
       concentric arcs read as a splash without the figurative
       water motif. -->
  <circle cx="392" cy="380" r="10" fill="#06b6d4"/>
  <circle cx="392" cy="380" r="22" fill="none"
          stroke="#06b6d4" stroke-width="2" opacity="0.4"/>
  <circle cx="392" cy="380" r="34" fill="none"
          stroke="#06b6d4" stroke-width="2" opacity="0.2"/>

  <!-- Wordmark — anchored bottom-left under the take-off
       point. Two-line, restrained, gives the mark room to
       breathe. -->
  <text x="120" y="448" text-anchor="start"
        font-family="Helvetica, Arial, sans-serif"
        font-size="32" font-weight="900" font-style="italic"
        letter-spacing="2" fill="#06b6d4">DIVINGHQ</text>
  <text x="120" y="475" text-anchor="start"
        font-family="Helvetica, Arial, sans-serif"
        font-size="11" font-weight="600"
        letter-spacing="5" fill="#67e8f9" opacity="0.6">DIVE · SCORE · STREAM</text>
</svg>
