# Prometheus — scrapes /metrics off the dive-recorder app every
# 30s. Single target; if you ever add a staging box or a worker
# process, append to `targets`. Each scrape request shows up in
# the app's own dive_recorder_http_requests_total{route="/metrics"}
# counter — that's expected.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    instance: dive-recorder-prod

scrape_configs:
  - job_name: dive_recorder
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: dive-recorder
