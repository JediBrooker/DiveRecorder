# Loki — single-binary mode for a single VPS. Reasonable defaults
# pulled from the upstream "single-binary" example, plus a 30-day
# retention window so logs don't grow forever.

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn   # Loki itself is chatty at info; quiet it down

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Retention: keep 30 days of logs. The compactor sweeps older
# chunks on a 10-minute interval. Tune retention_period up if
# you ever want longer history (and have the disk for it).
limits_config:
  retention_period: 720h    # 30 days
  reject_old_samples: true
  reject_old_samples_max_age: 168h   # don't accept timestamps > 7 days old
  allow_structured_metadata: false   # off by default in v13
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem
